<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --bg: #ffffff;
      --bg-alt: #f5f5f5;
      --bg-card: #fafafa;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent-amber: #c97a1a;
      --accent-green: #2e7d52;
      --accent-amber-bg: #fef9f0;
      --accent-green-bg: #f0faf4;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .site-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }

    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; flex-shrink: 0; }

    .view-btn {
      padding: 7px 20px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: var(--bg-alt);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .view-btn:first-child { border-right: 1px solid var(--border); }
    .view-btn.active { background: var(--text); color: var(--bg); }

    .site-header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .last-synced {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Month navigation ── */
    .month-nav {
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-nav button {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 30px;
      height: 30px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.1s;
    }

    .month-nav button:hover:not(:disabled) {
      background: var(--border);
    }

    .month-nav button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .nav-select {
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      padding: 0 6px;
      cursor: pointer;
      font-family: var(--font);
    }

    /* ── Layout ── */
    .main {
      padding: 24px;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 720px) {
      .columns { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      .site-header { padding: 12px 16px; }
      .month-nav { padding: 10px 16px; }
    }

    /* ── Column ── */
    .column-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }

    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .summary-chip {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .summary-chip strong {
      display: block;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    /* ── Tab toggle ── */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }

    .tab-btn:hover:not(.active-ip):not(.active-done) {
      border-color: #bbb;
      color: var(--text);
      background: var(--bg-alt);
    }

    .tab-btn.active-ip {
      background: var(--accent-amber);
      border-color: var(--accent-amber);
      color: #fff;
    }

    .tab-btn.active-done {
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: #fff;
    }

    .tab-panel { display: none; }
    .tab-panel.visible { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .card-title {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-meta span::before {
      content: attr(data-label) ": ";
      font-weight: 500;
      color: var(--text);
    }

    .status-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 6px;
    }

    .status-badge.draft {
      background: #f0f0f0;
      color: #666;
      border: 1px solid #ddd;
    }

    .status-badge.confirmed {
      background: var(--accent-amber-bg);
      color: var(--accent-amber);
      border: 1px solid #f0c070;
    }

    /* ── States ── */
    .empty-state {
      font-size: 13px;
      color: var(--text-muted);
      padding: 12px 0 4px;
    }

    .loading-overlay {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-message {
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      padding: 14px 16px;
      color: #b91c1c;
      font-size: 13px;
      margin: 24px;
    }

    /* ── Analytics ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    .a-section { margin-bottom: 30px; }

    .a-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .a-legend { font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: 0; }

    .a-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 720px) { .a-columns { grid-template-columns: 1fr; } }

    .bar-chart { display: flex; flex-direction: column; gap: 10px; }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 32px;
      align-items: center;
      gap: 10px;
    }

    .bar-label { font-size: 12px; color: var(--text-muted); text-align: right; white-space: nowrap; }

    .bar-track {
      background: var(--bg-alt);
      border-radius: 3px;
      height: 22px;
      overflow: hidden;
      display: flex;
      gap: 1px;
    }

    .bar-fp { background: var(--accent-amber); height: 100%; transition: width 0.4s ease; }
    .bar-sa { background: var(--accent-green); height: 100%; transition: width 0.4s ease; }
    .bar-total { font-size: 12px; font-weight: 600; color: var(--text); text-align: right; }

    .rank-list { display: flex; flex-direction: column; gap: 10px; }

    .rank-row {
      display: grid;
      grid-template-columns: 18px 1fr 70px 30px;
      align-items: center;
      gap: 8px;
    }

    .rank-num { font-size: 11px; color: var(--text-muted); text-align: right; }
    .rank-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-bar { height: 6px; border-radius: 3px; min-width: 2px; }
    .rank-val { font-size: 12px; font-weight: 600; text-align: right; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <h1>Production Dashboard</h1>
      <span class="last-synced" id="last-synced"></span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-monthly">Monthly</button>
      <button class="view-btn" id="btn-view-analytics">Analytics</button>
    </div>
  </header>

  <nav class="month-nav">
    <button id="btn-prev" title="Previous month">&#8592;</button>
    <select id="sel-month" class="nav-select"></select>
    <select id="sel-year" class="nav-select"></select>
    <button id="btn-next" title="Next month">&#8594;</button>
  </nav>

  <main class="main" id="main-content">
    <div class="loading-overlay">Loading data&hellip;</div>
  </main>

  <script>
    const MONTH_NAMES = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    let availableMonths = [];
    let currentIndex = 0;
    let analyticsCache = null;
    let currentView = "monthly";

    function formatMonth(ym) {
      const [y, m] = ym.split("-");
      return `${MONTH_NAMES[parseInt(m, 10) - 1]} ${y}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "—";
      const [y, m, d] = dateStr.split("-");
      if (!y || !m || !d) return dateStr;
      return `${parseInt(d, 10)} ${MONTH_NAMES[parseInt(m, 10) - 1]} ${y}`;
    }

    function formatCompletedDate(val) {
      if (!val) return null;
      // Try parsing as ISO or date-like string
      try {
        const d = new Date(val);
        if (!isNaN(d)) {
          return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
        }
      } catch (_) {}
      // Fallback: extract YYYY-MM-DD prefix
      const m = String(val).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${parseInt(m[3])} ${MONTH_NAMES[parseInt(m[2]) - 1]} ${m[1]}`;
      return String(val);
    }

    function formatTimestamp(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return `Last synced: ${d.toLocaleString("en-ZA", {
        day: "numeric", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit", timeZone: "Africa/Johannesburg"
      })} SAST`;
    }

    function renderCards(records) {
      if (!records || records.length === 0) {
        return `<p class="empty-state">No records for this period</p>`;
      }
      return records.map(r => {
        const staff = (r.production_staff || []).join(", ") || "—";
        const serials = (r.serial_numbers || []).join(", ") || "—";
        const badge = r.status === "draft"
          ? `<span class="status-badge draft">Draft</span>`
          : r.status === "confirmed"
            ? `<span class="status-badge confirmed">Confirmed</span>`
            : "";
        const completedSpan = r.completed_date
          ? `<span data-label="Completed">${esc(formatCompletedDate(r.completed_date))}</span>`
          : "";
        return `
          <div class="card">
            <div class="card-title">${esc(r.item_name)}${badge}</div>
            <div class="card-meta">
              <span data-label="Order">${esc(r.assembly_number)}</span>
              <span data-label="Qty">${esc(String(r.quantity))}</span>
              <span data-label="Date">${esc(formatDate(r.date))}</span>
              ${completedSpan}
              <span data-label="Staff">${esc(staff)}</span>
            </div>
            <div class="card-meta" style="margin-top:4px;">
              <span data-label="Serials">${esc(serials)}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderColumn(label, group, colId) {
      const ipCount = group.in_production.length;
      const doneCount = group.completed.length;
      return `
        <div>
          <div class="column-header">${label}</div>
          <div class="summary-row">
            <div class="summary-chip"><strong>${ipCount}</strong>In Production</div>
            <div class="summary-chip"><strong>${doneCount}</strong>Assembly Completed</div>
          </div>
          <div class="tab-bar">
            <button class="tab-btn active-ip" data-col="${colId}" data-tab="ip">
              In Production (${ipCount})
            </button>
            <button class="tab-btn" data-col="${colId}" data-tab="done">
              Assembly Completed (${doneCount})
            </button>
          </div>
          <div class="tab-panel visible" id="${colId}-ip">${renderCards(group.in_production)}</div>
          <div class="tab-panel" id="${colId}-done">${renderCards(group.completed)}</div>
        </div>
      `;
    }

    function setupToggles() {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const col = btn.dataset.col;
          const tab = btn.dataset.tab;
          document.querySelectorAll(`.tab-btn[data-col="${col}"]`).forEach(b => {
            b.classList.remove("active-ip", "active-done");
          });
          btn.classList.add(tab === "ip" ? "active-ip" : "active-done");
          document.getElementById(`${col}-ip`).classList.toggle("visible", tab === "ip");
          document.getElementById(`${col}-done`).classList.toggle("visible", tab === "done");
        });
      });
    }

    function renderDashboard(data) {
      document.getElementById("last-synced").textContent = formatTimestamp(data.generated_at);
      const main = document.getElementById("main-content");
      main.innerHTML = `
        <div class="columns">
          ${renderColumn("Finished Products", data.finished_products, "fp")}
          ${renderColumn("Subassemblies", data.subassemblies, "sa")}
        </div>
      `;
      setupToggles();
    }

    function renderError(msg) {
      document.getElementById("main-content").innerHTML =
        `<div class="error-message">${esc(msg)}</div>`;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function updateNav() {
      const ym = availableMonths[currentIndex];
      if (!ym) return;
      const [year] = ym.split("-");

      const years = [...new Set(availableMonths.map(m => m.split("-")[0]))];
      const monthsForYear = availableMonths.filter(m => m.startsWith(year + "-"));

      const selYear = document.getElementById("sel-year");
      const selMonth = document.getElementById("sel-month");

      selYear.innerHTML = years.map(y =>
        `<option value="${y}"${y === year ? " selected" : ""}>${y}</option>`
      ).join("");

      selMonth.innerHTML = monthsForYear.map(m => {
        const [, mm] = m.split("-");
        return `<option value="${m}"${m === ym ? " selected" : ""}>${MONTH_NAMES[parseInt(mm, 10) - 1]}</option>`;
      }).join("");

      document.getElementById("btn-prev").disabled = currentIndex >= availableMonths.length - 1;
      document.getElementById("btn-next").disabled = currentIndex <= 0;
    }

    async function loadMonth(ym) {
      document.getElementById("main-content").innerHTML =
        `<div class="loading-overlay">Loading data&hellip;</div>`;
      try {
        const resp = await fetch(`data/${ym}.json?_=${Date.now()}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        renderDashboard(data);
      } catch (e) {
        renderError(`Failed to load data for ${formatMonth(ym)}: ${e.message}`);
      }
    }

    async function loadAllMonths() {
      const results = {};
      await Promise.all(availableMonths.map(async ym => {
        try {
          const r = await fetch(`data/${ym}.json?_=${Date.now()}`);
          if (r.ok) results[ym] = await r.json();
        } catch (_) {}
      }));
      return results;
    }

    function computeAnalytics(allData) {
      const months = [...availableMonths].reverse().filter(ym => allData[ym]);
      const stats = months.map(ym => {
        const d = allData[ym];
        const fpDone = d.finished_products.completed;
        const saDone = d.subassemblies.completed;
        const allIP = [...d.finished_products.in_production, ...d.subassemblies.in_production];
        return {
          month: ym,
          label: formatMonth(ym),
          fpCount: fpDone.length,
          saCount: saDone.length,
          fpQty: fpDone.reduce((s, r) => s + (r.quantity || 0), 0),
          saQty: saDone.reduce((s, r) => s + (r.quantity || 0), 0),
          ipCount: allIP.length,
          allDone: [...fpDone, ...saDone],
        };
      });

      const totalCount = stats.reduce((s, m) => s + m.fpCount + m.saCount, 0);
      const totalQty = stats.reduce((s, m) => s + m.fpQty + m.saQty, 0);
      const current = stats[stats.length - 1] || {};

      const cutoff90 = new Date(Date.now() - 90 * 24 * 60 * 60 * 1000);
      let rolling90Count = 0, rolling90Qty = 0;
      stats.forEach(m => m.allDone.forEach(r => {
        if (r.date && new Date(r.date) >= cutoff90) {
          rolling90Count++;
          rolling90Qty += r.quantity || 0;
        }
      }));

      const itemMap = {};
      stats.forEach(m => m.allDone.forEach(r => {
        const k = r.item_name || "Unknown";
        if (!itemMap[k]) itemMap[k] = 0;
        itemMap[k] += r.quantity || 0;
      }));
      const topItems = Object.entries(itemMap).sort((a, b) => b[1] - a[1]).slice(0, 10);

      const staffMap = {};
      stats.forEach(m => m.allDone.forEach(r => {
        (r.production_staff || []).forEach(name => { staffMap[name] = (staffMap[name] || 0) + 1; });
      }));
      const staffList = Object.entries(staffMap).sort((a, b) => b[1] - a[1]);

      return { stats, totalCount, totalQty, current, topItems, staffList, rolling90Count, rolling90Qty };
    }

    function renderAnalytics(a) {
      const curDone = (a.current.fpCount || 0) + (a.current.saCount || 0);
      const curIP   = a.current.ipCount || 0;
      const curLabel = a.current.label || "—";

      const maxDone = Math.max(...a.stats.map(m => m.fpCount + m.saCount), 1);
      const bars = [...a.stats].reverse().map(m => {
        const total = m.fpCount + m.saCount;
        const fpPct = (m.fpCount / maxDone * 100).toFixed(1);
        const saPct = (m.saCount / maxDone * 100).toFixed(1);
        return `<div class="bar-row">
          <span class="bar-label">${m.label}</span>
          <div class="bar-track">
            <div class="bar-fp" style="width:${fpPct}%"></div>
            <div class="bar-sa" style="width:${saPct}%"></div>
          </div>
          <span class="bar-total">${total}</span>
        </div>`;
      }).join("");

      const maxItemQty = a.topItems.length ? a.topItems[0][1] : 1;
      const itemRows = a.topItems.map(([name, qty], i) => `
        <div class="rank-row">
          <span class="rank-num">${i + 1}</span>
          <span class="rank-name" title="${esc(name)}">${esc(name)}</span>
          <div class="rank-bar" style="width:${(qty/maxItemQty*100).toFixed(1)}%;background:var(--accent-amber)"></div>
          <span class="rank-val">${qty}</span>
        </div>`).join("") || `<p class="empty-state">No completed assemblies yet</p>`;

      const maxStaff = a.staffList.length ? a.staffList[0][1] : 1;
      const staffRows = a.staffList.map(([name, count], i) => `
        <div class="rank-row">
          <span class="rank-num">${i + 1}</span>
          <span class="rank-name" title="${esc(name)}">${esc(name)}</span>
          <div class="rank-bar" style="width:${(count/maxStaff*100).toFixed(1)}%;background:var(--accent-green)"></div>
          <span class="rank-val">${count}</span>
        </div>`).join("") || `<p class="empty-state">No staff data available</p>`;

      document.getElementById("main-content").innerHTML = `
        <div class="a-section">
          <div class="kpi-row">
            <div class="kpi-card">
              <div class="kpi-value">${a.totalCount}</div>
              <div class="kpi-label">Total Completed</div>
              <div class="kpi-sub">${a.totalQty} units · ${a.stats.length} month${a.stats.length !== 1 ? "s" : ""}</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-value">${curDone}</div>
              <div class="kpi-label">Completed This Month</div>
              <div class="kpi-sub">${curLabel}</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-value">${curIP}</div>
              <div class="kpi-label">In Production Now</div>
              <div class="kpi-sub">As of last sync</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-value">${a.rolling90Count}</div>
              <div class="kpi-label">Completed (Last 90 Days)</div>
              <div class="kpi-sub">${a.rolling90Qty} units produced</div>
            </div>
          </div>
        </div>
        <div class="a-section">
          <div class="a-title">
            Assemblies Completed per Month
            <span class="a-legend">
              <span style="color:var(--accent-amber)">■</span> Finished Products &nbsp;
              <span style="color:var(--accent-green)">■</span> Subassemblies
            </span>
          </div>
          <div class="bar-chart">${bars || '<p class="empty-state">No data</p>'}</div>
        </div>
        <div class="a-columns">
          <div class="a-section">
            <div class="a-title">Top Items by Units Completed</div>
            <div class="rank-list">${itemRows}</div>
          </div>
          <div class="a-section">
            <div class="a-title">Production Staff Activity</div>
            <div class="rank-list">${staffRows}</div>
          </div>
        </div>
      `;
    }

    async function showAnalytics() {
      if (!analyticsCache) {
        document.getElementById("main-content").innerHTML =
          `<div class="loading-overlay">Loading analytics&hellip;</div>`;
        analyticsCache = computeAnalytics(await loadAllMonths());
      }
      renderAnalytics(analyticsCache);
    }

    function showView(view) {
      currentView = view;
      document.getElementById("btn-view-monthly").classList.toggle("active", view === "monthly");
      document.getElementById("btn-view-analytics").classList.toggle("active", view === "analytics");
      document.querySelector(".month-nav").style.display = view === "monthly" ? "" : "none";
      if (view === "monthly") {
        loadMonth(availableMonths[currentIndex]);
      } else {
        showAnalytics();
      }
    }

    async function init() {
      // Load available months index
      try {
        const resp = await fetch(`data/index.json?_=${Date.now()}`);
        if (resp.ok) {
          availableMonths = await resp.json();
        }
      } catch (_) {
        availableMonths = [];
      }

      // Load latest data
      try {
        const resp = await fetch(`data/latest.json?_=${Date.now()}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        // Sync currentIndex to the month in latest.json
        const monthInData = data.month;
        const idx = availableMonths.indexOf(monthInData);
        currentIndex = idx >= 0 ? idx : 0;

        // If index was empty, populate with at least this month
        if (availableMonths.length === 0 && monthInData) {
          availableMonths = [monthInData];
        }

        updateNav();
        renderDashboard(data);
      } catch (e) {
        updateNav();
        // No latest.json yet — show empty state message
        if (availableMonths.length === 0) {
          document.getElementById("main-content").innerHTML =
            `<div class="error-message">No data available yet. Run the GitHub Action manually to generate the first data files.</div>`;
        } else {
          renderError(`Could not load dashboard data: ${e.message}`);
        }
      }
    }

    document.getElementById("btn-view-monthly").addEventListener("click", () => {
      if (currentView !== "monthly") showView("monthly");
    });

    document.getElementById("btn-view-analytics").addEventListener("click", () => {
      if (currentView !== "analytics") showView("analytics");
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentIndex < availableMonths.length - 1) {
        currentIndex++;
        updateNav();
        loadMonth(availableMonths[currentIndex]);
      }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        updateNav();
        loadMonth(availableMonths[currentIndex]);
      }
    });

    document.getElementById("sel-year").addEventListener("change", e => {
      const yr = e.target.value;
      const match = availableMonths.find(m => m.startsWith(yr + "-"));
      if (match) {
        currentIndex = availableMonths.indexOf(match);
        updateNav();
        if (currentView === "monthly") loadMonth(availableMonths[currentIndex]);
      }
    });

    document.getElementById("sel-month").addEventListener("change", e => {
      const idx = availableMonths.indexOf(e.target.value);
      if (idx >= 0) {
        currentIndex = idx;
        updateNav();
        if (currentView === "monthly") loadMonth(availableMonths[currentIndex]);
      }
    });

    init();
  </script>

</body>
</html>
